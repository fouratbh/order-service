apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: fouratbh/order-service:latest # Vérifie bien ton pseudo Docker Hub
        ports:
        - containerPort: 8081 # Port de ton microservice Order
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://votre-db-host:5432/order_db"
				- name: KAFKA_SERVERS
				  value: "my-kafka-broker:9092"